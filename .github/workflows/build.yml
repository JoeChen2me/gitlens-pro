name: Build Binaries

on:
  workflow_dispatch:
  push:
    branches:
      - main
    tags:
      - "v*"
    paths:
      - "*.go"
      - "**/*.go"
      - "go.mod"
      - "scripts/**"
      - ".github/workflows/build.yml"
  pull_request:
    paths:
      - "*.go"
      - "**/*.go"
      - "go.mod"
      - "scripts/**"
      - ".github/workflows/build.yml"

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - goos: windows
            goarch: amd64
            binary_name: activate-windows-amd64.exe
            artifact_name: gitlens-pro-windows-amd64
          - goos: linux
            goarch: amd64
            binary_name: activate-linux-amd64
            artifact_name: gitlens-pro-linux-amd64
          - goos: darwin
            goarch: amd64
            binary_name: activate-darwin-amd64
            artifact_name: gitlens-pro-darwin-amd64
          - goos: darwin
            goarch: arm64
            binary_name: activate-darwin-arm64
            artifact_name: gitlens-pro-darwin-arm64

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Prepare output directory
        run: mkdir -p dist

      - name: Build binary
        run: GOOS=${{ matrix.goos }} GOARCH=${{ matrix.goarch }} go build -o dist/${{ matrix.binary_name }}

      - name: Upload platform artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact_name }}
          path: dist/${{ matrix.binary_name }}
          if-no-files-found: error

  release:
    if: startsWith(github.ref, 'refs/tags/v')
    needs: build
    runs-on: ubuntu-latest

    steps:
      - name: Download all build artifacts
        uses: actions/download-artifact@v4
        with:
          path: release-assets
          pattern: gitlens-pro-*
          merge-multiple: true

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: release-assets/*
          generate_release_notes: true
